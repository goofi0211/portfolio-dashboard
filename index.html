<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>便當盒投資組合</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>便當盒投資組合</h1>
      <div class="header-right">
        <div class="toggle-group">
          <button class="toggle-btn active" data-currency="USD">USD</button>
          <button class="toggle-btn" data-currency="TWD">TWD</button>
        </div>
        <span id="updated-at" class="updated-at"></span>
      </div>
    </header>

    <div id="loading" class="loading">載入資料中...</div>
    <div id="error" class="error hidden"></div>

    <section id="main-content" class="hidden">

      <!-- 總覽卡片（5張） -->
      <div class="summary-grid">
        <div class="card">
          <div class="card-label">總市值</div>
          <div class="card-value" id="total-market-value">—</div>
        </div>
        <div class="card">
          <div class="card-label">總成本</div>
          <div class="card-value" id="total-cost">—</div>
        </div>
        <div class="card">
          <div class="card-label">未實現損益</div>
          <div class="card-value" id="total-pnl">—</div>
          <div class="card-sub" id="total-pnl-pct"></div>
        </div>
        <div class="card">
          <div class="card-label">累積報酬</div>
          <div class="card-value" id="cumulative-return">—</div>
          <div class="card-sub" id="cumulative-since"></div>
        </div>
        <div class="card">
          <div class="card-label">YTD 報酬</div>
          <div class="card-value" id="ytd-return">—</div>
          <div class="card-sub" id="ytd-sub"></div>
        </div>
      </div>

      <!-- 資產走勢圖 -->
      <div class="chart-section">
        <div class="section-header">
          <h2>資產走勢</h2>
          <div class="controls">
            <div class="toggle-group">
              <button class="toggle-btn active" data-hmode="absolute">絕對值</button>
              <button class="toggle-btn" data-hmode="spy">對比 SPY</button>
            </div>
            <div class="toggle-group">
              <button class="range-btn" data-range="30">30 天</button>
              <button class="range-btn" data-range="90">90 天</button>
              <button class="range-btn" data-range="365">1 年</button>
              <button class="range-btn active" data-range="all">全部</button>
            </div>
          </div>
        </div>
        <div id="history-empty" class="empty-msg">資料蒐集中，明日起開始累積每日快照...</div>
        <div class="history-chart-wrapper hidden" id="history-chart-wrapper">
          <canvas id="history-chart"></canvas>
        </div>
      </div>

      <!-- 資產配置（股票/現金 + 產業配置） -->
      <div class="chart-section">
        <h2>資產配置</h2>
        <div class="allocation-grid">
          <div class="allocation-col">
            <div class="sub-chart-title">股票 / 現金</div>
            <div class="chart-wrapper">
              <canvas id="allocation-chart"></canvas>
            </div>
          </div>
          <div class="allocation-col">
            <div class="sub-chart-title">產業配置</div>
            <div class="chart-wrapper">
              <canvas id="industry-chart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- 十大持股 -->
      <div class="chart-section">
        <h2>十大持股（依市值）</h2>
        <div class="top10-wrapper">
          <canvas id="top10-chart"></canvas>
        </div>
      </div>

      <!-- 損益貢獻 -->
      <div class="chart-section">
        <div class="section-header">
          <h2>損益貢獻</h2>
          <div class="toggle-group">
            <button class="toggle-btn active" data-contrib="industry">產業</button>
            <button class="toggle-btn" data-contrib="stocks">個股</button>
          </div>
        </div>
        <div class="contribution-wrapper">
          <canvas id="contribution-chart"></canvas>
        </div>
      </div>

      <!-- 個股分布圖（Treemap） -->
      <div class="treemap-section">
        <div class="section-header">
          <h2>個股分布圖</h2>
          <div class="toggle-group">
            <button class="toggle-btn active" data-mode="daily">今日漲幅</button>
            <button class="toggle-btn" data-mode="pnl">未實現損益</button>
          </div>
        </div>
        <div id="treemap" class="treemap"></div>
      </div>

    </section>
  </div>

  <div id="tooltip" class="tooltip hidden"></div>
  <script src="app.js"></script>
</body>
</html>
